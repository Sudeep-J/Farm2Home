<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: #e8f5e9;
            text-align: center;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 100px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            background: green;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Login 👤</h2>

    <input type="text" placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    alert("Login Successful!");
    window.location.href = "products.html";
}
</script>

</body>
</html>
